<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage - Bri Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>Welcome to My Portfolio</h1>
            <p>Discover my projects and experiences.</p>
            <a href="#featured-projects" class="btn">View Projects</a>
        </div>
    </header>

    <section id="featured-projects" class="projects">
        <div class="container">
            <h2>Featured Projects</h2>
            <div class="projects-grid">
                <article class="project">
                    <img src="project1.jpg" alt="Project 1">
                    <h3>Project One</h3>
                    <p>Short description of project one.</p>
                </article>
                <article class="project">
                    <img src="project2.jpg" alt="Project 2">
                    <h3>Project Two</h3>
                    <p>Short description of project two.</p>
                </article>
                <article class="project">
                    <img src="project3.jpg" alt="Project 3">
                    <h3>Project Three</h3>
                    <p>Short description of project three.</p>
                </article>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bri. All rights reserved.</p>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
